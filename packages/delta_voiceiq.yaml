# =============================================================================
# Delta VoiceIQ 2.0 - Home Assistant Package
# https://github.com/YOUR_USERNAME/delta-voiceiq-2.0-ha
# =============================================================================
# Drop this file into /config/packages/ and enable packages in configuration.yaml:
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Required secrets.yaml entries:
#   delta_token: "Bearer eyJhbGciOi..."
#   delta_mac_address: "YOUR_MAC_ADDRESS"
#   delta_user_id: "YOUR_USER_ID"
#
# Also required:
#   - /config/www/delta-refresh.html (token refresh page)
#   - /config/scripts/delta_token_exchange.sh (chmod +x)
# =============================================================================


# ------------------------------------
# Input Helpers
# ------------------------------------

input_boolean:
  delta_faucet_state:
    name: Delta Faucet State
    icon: mdi:faucet

input_text:
  delta_mac_address:
    name: Delta Faucet MAC Address
    icon: mdi:wifi
    max: 20
  delta_user_id:
    name: Delta User ID
    icon: mdi:account
    max: 40
  delta_auth_code:
    name: Delta Auth Code
    icon: mdi:key-variant
    max: 255
    mode: text
  delta_token_status:
    name: Delta Token Status
    icon: mdi:check-circle
    max: 255
    mode: text
    initial: "No refresh attempted"

input_number:
  delta_faucet_custom_dispense:
    name: Delta Faucet Custom Dispense
    icon: mdi:water-pump
    min: 30
    max: 15000
    step: 30
    unit_of_measurement: ml
    mode: box


# ------------------------------------
# REST Commands
# ------------------------------------
# NOTE: Update these headers if the app version changes.

rest_command:
  delta_faucet_on:
    url: >-
      https://device.deltafaucet.com/api/device/v3/ToggleWater?macAddress={{
      states('input_text.delta_mac_address') }}&toggle=on
    method: POST
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"

  delta_faucet_off:
    url: >-
      https://device.deltafaucet.com/api/device/v3/ToggleWater?macAddress={{
      states('input_text.delta_mac_address') }}&toggle=off
    method: POST
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"

  delta_faucet_dispense:
    url: >-
      https://device.deltafaucet.com/api/device/v2/Dispense?macAddress={{
      states('input_text.delta_mac_address') }}&milliliters={{ milliliters }}
    method: POST
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"

  delta_faucet_handwash:
    url: "https://device.deltafaucet.com/api/voice/v4/handWashMode"
    method: POST
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"


# ------------------------------------
# REST Sensors (Usage Tracking)
# ------------------------------------

sensor:
  - platform: rest
    name: Delta Faucet Usage Today
    resource_template: >-
      https://device.deltafaucet.com/api/device/v2/UsageReport?macAddress={{
      states('input_text.delta_mac_address') }}&interval=0
    method: GET
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"
    value_template: "{{ value_json.retObject.datasets[0].data | sum | round(2) }}"
    unit_of_measurement: "gal"
    device_class: water
    state_class: total_increasing
    scan_interval: 600

  - platform: rest
    name: Delta Faucet Usage Week
    resource_template: >-
      https://device.deltafaucet.com/api/device/v2/UsageReport?macAddress={{
      states('input_text.delta_mac_address') }}&interval=1
    method: GET
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"
    value_template: "{{ value_json.retObject.datasets[0].data | sum | round(2) }}"
    unit_of_measurement: "gal"
    device_class: water
    state_class: total_increasing
    scan_interval: 3600

  - platform: rest
    name: Delta Faucet Usage Month
    resource_template: >-
      https://device.deltafaucet.com/api/device/v2/UsageReport?macAddress={{
      states('input_text.delta_mac_address') }}&interval=2
    method: GET
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"
    value_template: "{{ value_json.retObject.datasets[0].data | sum | round(2) }}"
    unit_of_measurement: "gal"
    device_class: water
    state_class: total_increasing
    scan_interval: 18000

  - platform: rest
    name: Delta Faucet Usage Year
    resource_template: >-
      https://device.deltafaucet.com/api/device/v2/UsageReport?macAddress={{
      states('input_text.delta_mac_address') }}&interval=3
    method: GET
    headers:
      Authorization: !secret delta_token
      dfc-source: mobile
      User-Agent: "DFCatHome/2.6.0 CFNetwork/3860.400.51 Darwin/25.3.0"
    value_template: "{{ value_json.retObject.datasets[0].data | sum | round(2) }}"
    unit_of_measurement: "gal"
    device_class: water
    state_class: total_increasing
    scan_interval: 86400


# ------------------------------------
# Template Sensor (Token Expiry)
# ------------------------------------
# IMPORTANT: Replace the exp_ts value below with the 'exp' claim from your JWT.
# The token exchange script updates this automatically after a refresh.

template:
  - sensor:
      - name: "Delta Token Expiry"
        state: >
          {% set exp_ts = 0000000000 %}
          {% set days_left = ((exp_ts - as_timestamp(now())) / 86400) | int %}
          {{ days_left }} days


# ------------------------------------
# Shell Command (Token Refresh)
# ------------------------------------

shell_command:
  delta_token_exchange: >
    /bin/sh /config/scripts/delta_token_exchange.sh
    '{{ states("input_text.delta_auth_code") }}'


# ------------------------------------
# Automation (Token Expiry Warning)
# ------------------------------------
# IMPORTANT: Replace exp_ts with the 'exp' claim from your JWT.

automation:
  - id: delta_token_expiry_warning
    alias: "Delta Faucet Token Expiry Warning"
    description: "Warns when the Delta faucet API token is about to expire"
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: template
        value_template: >
          {% set exp_ts = 1780809002 %}
          {% set days_left = ((exp_ts - as_timestamp(now())) / 86400) | int %}
          {{ days_left < 7 }}
    action:
      - service: persistent_notification.create
        data:
          title: "Delta Faucet Token Expiring Soon"
          message: >
            Your Delta faucet API token expires in less than 7 days.
            Visit /local/delta-refresh.html to refresh it.
          notification_id: delta_token_warning
    mode: single
