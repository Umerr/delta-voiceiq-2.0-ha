# Delta VoiceIQ Faucet - Dashboard Card Configuration
# ====================================================
#
# This is a Mushroom entity card with card-mod animations that creates
# an animated water-fill effect inside the icon.
#
# Requirements:
#   - Mushroom Cards (HACS)
#   - card-mod (HACS)
#   - browser_mod (HACS) - for the long-press popup
#
# Card behavior:
#   - Tap: toggle faucet on/off
#   - Long press: open popup with dispense buttons, usage stats, history
#
# Card states:
#   - Flowing: blue icon, "FLOWING" badge, water-fill + bubble animations
#   - Off with usage: grey icon, "X.X GAL TODAY" badge, slow wave animation
#   - Off no usage: grey icon, "OFF" badge, no animations
#
# To use: copy this YAML into your dashboard via the raw config editor.
# Customize the container names, sizes, and icons to match your faucet.
#
# Animation styling credit: @Anashost (HA Animated Cards)
# https://github.com/Anashost/HA-Animated-cards/blob/main/appliances.md

type: custom:mushroom-entity-card
entity: input_boolean.delta_faucet_state
name: Kitchen Faucet
icon: mdi:faucet
primary_info: name
secondary_info: none
icon_color: light-grey
fill_container: false
grid_options:
  rows: 2
tap_action:
  action: call-service
  service: script.delta_faucet_toggle
hold_action:
  action: fire-dom-event
  browser_mod:
    service: browser_mod.popup
    data:
      title: Kitchen Faucet
      size: normal
      content:
        type: vertical-stack
        cards:
          # --- Faucet On/Off Toggle ---
          - type: custom:mushroom-entity-card
            entity: input_boolean.delta_faucet_state
            name: Kitchen Faucet
            icon: mdi:faucet
            tap_action:
              action: call-service
              service: script.delta_faucet_toggle
            layout: horizontal
            icon_color: blue
            primary_info: name
            secondary_info: state

          # --- Dispense Buttons ---
          # Customize these to match your faucet's containers.
          # Tap = dispense that amount. Hold Custom = change the custom amount.
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Glass
                secondary: 12 oz
                icon: mdi:cup-water
                icon_color: cyan
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.delta_faucet_dispense_ml
                  service_data:
                    milliliters: 355
                card_mod:
                  style: "ha-card { cursor: pointer; } ha-card:active { transform: scale(0.95); }"
              - type: custom:mushroom-template-card
                primary: Coffee Pot
                secondary: 4 cups
                icon: mdi:coffee-maker
                icon_color: amber
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.delta_faucet_dispense_ml
                  service_data:
                    milliliters: 946
                card_mod:
                  style: "ha-card { cursor: pointer; } ha-card:active { transform: scale(0.95); }"
              - type: custom:mushroom-template-card
                primary: Sink
                secondary: 3 gal
                icon: mdi:countertop
                icon_color: teal
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.delta_faucet_dispense_ml
                  service_data:
                    milliliters: 11356
                card_mod:
                  style: "ha-card { cursor: pointer; } ha-card:active { transform: scale(0.95); }"
              - type: custom:mushroom-template-card
                primary: Custom
                secondary: "{{ states('input_number.delta_faucet_custom_dispense') | int }} ml"
                icon: mdi:water-pump
                icon_color: deep-purple
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.delta_faucet_dispense_ml
                  service_data:
                    milliliters: "{{ states('input_number.delta_faucet_custom_dispense') | int }}"
                hold_action:
                  action: more-info
                  entity: input_number.delta_faucet_custom_dispense
                card_mod:
                  style: "ha-card { cursor: pointer; } ha-card:active { transform: scale(0.95); }"

          # --- Usage Stats ---
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.delta_faucet_usage_today') }} gal"
                secondary: Today
                icon: mdi:water
                icon_color: blue
                layout: vertical
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.delta_faucet_usage_week') }} gal"
                secondary: Week
                icon: mdi:calendar-week
                icon_color: cyan
                layout: vertical
              - type: custom:mushroom-template-card
                primary: "{{ states('sensor.delta_faucet_usage_month') }} gal"
                secondary: Month
                icon: mdi:calendar-month
                icon_color: teal
                layout: vertical

          # --- Usage History Graph ---
          - type: history-graph
            entities:
              - entity: sensor.delta_faucet_usage_today
                name: Usage
            hours_to_show: 168

          # --- Token Expiry (tap to open refresh page) ---
          - type: custom:mushroom-entity-card
            entity: sensor.delta_token_expiry
            name: Token Expiry
            icon: mdi:key-chain
            icon_color: green
            layout: horizontal
            tap_action:
              action: url
              url_path: /local/delta-refresh.html

# --- Animated Card Styling (card-mod) ---
# This creates the water-fill effect, badge, progress bar, and animations.
card_mod:
  entities:
    - input_boolean.delta_faucet_state
    - sensor.delta_faucet_usage_today
  style:
    # --- Main card styles (badge, progress bar, state colors) ---
    ".": |
      ha-card{
        {% set usage=states('sensor.delta_faucet_usage_today')|float(0) %}
        {% set faucet_on=states('input_boolean.delta_faucet_state')=='on' %}
        {% set avg=20 %}
        {% set pg=[(usage/avg*100)|int,100]|min %}
        --config-icon-size:56px;
        --config-font-primary:14px;
        --config-font-secondary:11px;
        --config-font-badge:10px;
        {% if faucet_on %}
          {% set c='33,150,243' %}{% set bt='FLOWING' %}
          {% set ic='white' %}{% set blend='overlay' %}
        {% elif usage>0 %}
          {% set c='158,158,158' %}{% set bt=usage|round(1)|string~' gal today' %}
          {% set ic='rgba(255,255,255,0.7)' %}{% set blend='normal' %}
        {% else %}
          {% set c='158,158,158' %}{% set bt='Off' %}
          {% set ic='rgba(255,255,255,0.5)' %}{% set blend='normal' %}
        {% endif %}
        --fc-color:{{c}};
        --fc-level:{{pg}}%;
        --fc-badge-content:"{{bt}}";
        --fc-icon-color:{{ic}};
        --fc-blend:{{blend}};
        {% if faucet_on %}
          --fc-anim-shake:faucet-vibrate 0.6s ease-in-out infinite;
          --fc-anim-wave:wave 3s linear infinite;
          --fc-anim-overlay:bubbles 0.8s linear infinite;
          --fc-overlay-bg:radial-gradient(2px 2px at 30% 75%,white,transparent),radial-gradient(2px 2px at 60% 65%,white,transparent);
        {% elif usage>0 %}
          --fc-anim-shake:none;
          --fc-anim-wave:wave 6s linear infinite;
          --fc-anim-overlay:none;
          --fc-overlay-bg:none;
        {% else %}
          --fc-anim-shake:none;
          --fc-anim-wave:none;
          --fc-anim-overlay:none;
          --fc-overlay-bg:none;
        {% endif %}
        transition:all 0.5s ease;
        overflow:hidden;
      }
      ha-card::before{
        content:var(--fc-badge-content);
        position:absolute;top:8px;right:8px;
        background:rgba(var(--fc-color),0.15);
        color:rgb(var(--fc-color));
        border:1px solid rgba(var(--fc-color),0.3);
        padding:2px 8px;border-radius:12px;
        text-transform:uppercase;font-weight:600;
        letter-spacing:0.5px;
        font-size:var(--config-font-badge);
        z-index:2;
      }
      ha-card::after{
        content:'';position:absolute;bottom:0;left:0;
        height:4px;width:var(--fc-level);
        background:rgb(var(--fc-color));
        box-shadow:0 0 10px rgb(var(--fc-color));
        transition:width 0.5s ease;
      }

    # --- Icon shape styles (water fill, wave animation, bubbles) ---
    "mushroom-shape-icon$": |
      {% set faucet_on=states('input_boolean.delta_faucet_state')=='on' %}
      .shape{
        --icon-size:var(--config-icon-size) !important;
        background:rgba(255,255,255,0.05) !important;
        overflow:hidden;position:relative;
        border:1px solid rgba(255,255,255,0.1);
        animation:var(--fc-anim-shake) !important;
        transform-origin:50% 40%;
      }
      .shape::before{
        content:'';position:absolute;left:-50%;
        width:200%;height:200%;
        top:calc(100% - var(--fc-level));
        background:rgba(var(--fc-color),0.6);
        border-radius:40%;
        animation:var(--fc-anim-wave);
      }
      .shape::after{
        content:'';position:absolute;inset:0;
        background-image:var(--fc-overlay-bg);
        background-size:100% 100%;
        animation:var(--fc-anim-overlay);
        z-index:2;
      }
      ha-icon{
        z-index:3;position:relative;
        {% if faucet_on %}
          color:white !important;
          mix-blend-mode:overlay;
        {% else %}
          color:rgba(255,255,255,0.7) !important;
          mix-blend-mode:normal;
        {% endif %}
      }
      @keyframes wave{
        from{transform:rotate(0deg)}
        to{transform:rotate(360deg)}
      }
      @keyframes faucet-vibrate{
        0%,100%{transform:translateX(0) rotate(0deg)}
        20%{transform:translateX(-1px) rotate(-1deg)}
        40%{transform:translateX(1px) rotate(1deg)}
        60%{transform:translateX(-0.5px) rotate(-0.5deg)}
        80%{transform:translateX(0.5px) rotate(0.5deg)}
      }
      @keyframes bubbles{
        0%{transform:translateY(8px);opacity:0}
        40%{opacity:0.9}
        100%{transform:translateY(-18px);opacity:0}
      }

    # --- Text size overrides ---
    "mushroom-state-info$": |
      .container .primary{font-size:var(--config-font-primary) !important}
      .container .secondary{font-size:var(--config-font-secondary) !important}
